name: frontend

on:
  push: { branches: [main, dev] }
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm test
      - run: npm run build

  # Cloudflare Pages deploy — gate: only pushes (never PRs from forks), only after tests pass.
  # main → Production; any other pushed branch → Preview (aliased by branch name).
  # Needs repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit), CLOUDFLARE_ACCOUNT_ID.
  # Runtime env vars/secrets are NOT set here — they live in the Pages project
  # (Settings → Variables and Secrets, per Production/Preview environment).
  deploy:
    needs: test-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          # Pin to the version in frontend/package.json devDependencies — the
          # action defaults to latest, and 4.110 breaks preview-env Functions
          # publish ("process is not defined") that 4.100 deploys fine.
          wranglerVersion: "4.100.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy ./dist --project-name=vibing-farmer --branch=${{ github.ref_name }}
