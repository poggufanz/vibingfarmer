[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read-write", path = "./frontend/public/data" }
]

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
eth_mainnet = "${MAINNET_RPC}"
base_mainnet = "${BASE_MAINNET_RPC}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }

[invariant]
runs = 256
depth = 50
fail_on_revert = false