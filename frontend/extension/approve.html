<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VF Wallet — Approval</title>
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="./vibing_farmer.logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <style>
      :root {
        --bg: #0e0f0c;
        --card: #1a1b16;
        --border: rgba(236, 235, 225, 0.14);
        --text: #ecebe1;
        --muted: #95958a;
        --faint: #56564f;
        --accent: #cfff3d;
        --danger: #ff6b6b;
        --font: 'Geist', system-ui, -apple-system, sans-serif;
        --mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .approvebox {
        width: 100%;
        max-width: 400px;
        min-height: 100vh;
        background: var(--card);
        border: 1px solid var(--border);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        overflow: hidden;
      }
      .logo img {
        width: 100%;
        height: 100%;
        display: block;
      }
      .brand-name {
        font-weight: 500;
        font-size: 13px;
      }
      #origin {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--accent);
        word-break: break-all;
      }
      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      #note {
        margin: 0;
        font-size: 11.5px;
        color: var(--faint);
        line-height: 1.5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th {
        text-align: left;
        font-weight: 400;
        color: var(--muted);
        padding: 4px 10px 4px 0;
        white-space: nowrap;
        vertical-align: top;
        width: 1%;
      }
      td {
        font-family: var(--mono);
        word-break: break-all;
        padding: 4px 0;
      }
      details {
        font-size: 11px;
        color: var(--muted);
      }
      details pre {
        max-height: 120px;
        overflow: auto;
        font-family: var(--mono);
        font-size: 10px;
        word-break: break-all;
        white-space: pre-wrap;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
      }
      #status {
        margin: 0;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        min-height: 16px;
      }
      .buttons {
        margin-top: auto;
        display: flex;
        gap: 10px;
      }
      button {
        flex: 1;
        padding: 10px 0;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      #reject {
        background: transparent;
        color: var(--muted);
      }
      #approve {
        background: var(--accent);
        border-color: var(--accent);
        color: #0e0f0c;
      }
    </style>
  </head>
  <body>
    <div class="approvebox">
      <div class="head">
        <div class="logo"><img src="./vibing_farmer.logo.svg" alt="Vibing Farmer" /></div>
        <div class="brand-name">VF Wallet</div>
      </div>
      <div id="origin"></div>
      <h1 id="title">Loading request…</h1>
      <p id="note"></p>
      <table>
        <tbody id="rows"></tbody>
      </table>
      <div id="raw-wrap" style="display: none">
        <details>
          <summary>Raw XDR</summary>
          <pre id="raw"></pre>
        </details>
      </div>
      <p id="status"></p>
      <div class="buttons">
        <button id="reject">Reject</button>
        <button id="approve">Approve</button>
      </div>
    </div>
    <script type="module" src="./approve.js"></script>
  </body>
</html>
